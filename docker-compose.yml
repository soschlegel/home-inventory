services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: home_inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: soschlegel/home-inventory-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://inventory:${DB_PASSWORD:-changeme}@postgres:5432/home_inventory
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_please}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_refresh_secret_please}
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
    volumes:
      - ${UPLOADS_DIR:-/opt/home-inventory/uploads}:/app/uploads

  frontend:
    image: soschlegel/home-inventory-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: soschlegel/home-inventory-nginx:latest
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${PORT:-3000}:80"
    volumes:
      - ${UPLOADS_DIR:-/opt/home-inventory/uploads}:/app/uploads:ro

volumes:
  postgres_data:
